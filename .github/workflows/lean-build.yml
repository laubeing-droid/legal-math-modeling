name: Lake Build + Scan

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.30.0

      - name: Lake Build
        run: |
          export PATH=~/.elan/bin:$PATH
          cd proofs/lean/juris_lean && lake build

      - name: Scan
        run: |
          export PATH=~/.elan/bin:$PATH
          cd proofs/lean/juris_lean
          ! grep -rnE '(sorry|admit|axiom)' JurisLean/ --include='*.lean'
