name: Lake Build + Scan

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.30.0
          echo "C:\Users\being/.elan/bin" >> 

      - name: Verify toolchain
        run: |
          export PATH="C:\Users\being/.elan/bin:"
          which lake
          lake --version
          lean --version

      - name: Lake Build
        run: |
          export PATH="C:\Users\being/.elan/bin:"
          cd proofs/lean/juris_lean
          lake build

      - name: Scan (0 sorry/admit/axiom required)
        run: |
          export PATH="C:\Users\being/.elan/bin:"
          cd proofs/lean/juris_lean
          ! grep -rn 'sorry\|admit\|axiom' JurisLean/ --include='*.lean'
