name: Lake Build + Scan

# Trigger: push to master/main or manual workflow_dispatch

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Restore elan cache
        id: elan-cache
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-lean4-v4.30.0

      - name: Install elan
        if: steps.elan-cache.outputs.cache-hit != 'true'
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.30.0

      - name: Restore Lake packages cache
        uses: actions/cache@v4
        with:
          path: proofs/lean/juris_lean/.lake/packages
          key: ${{ runner.os }}-lake-packages-${{ hashFiles('proofs/lean/juris_lean/lakefile.lean', 'proofs/lean/juris_lean/lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lake-packages-

      - name: Fetch Mathlib cache
        run: |
          set -euo pipefail
          export PATH="$HOME/.elan/bin:$PATH"
          cd proofs/lean/juris_lean
          lake exe cache get
          cached=$(find .lake/packages/mathlib/.lake/build -name "*.olean" 2>/dev/null | wc -l)
          echo "Cached oleans: $cached"
          if [ "$cached" -lt 2000 ]; then
            echo "::warning::Mathlib cache incomplete ($cached oleans). Build may timeout."
          fi

      - name: Lake Build
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          cd proofs/lean/juris_lean && lake build

      - name: Scan
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          python3 scripts/scan_lean_guards.py proofs/lean/juris_lean/JurisLean
