        - Within_Rescission_Limitation
        effect: Contract_Voidable
    mapping:
      CN: 合同效力
      HK: 合約效力
      US: Contract Validity
    behavioral_logic:
      default_confidence: 1.0
      if_rebutted_by_absolute: Contract_Void
      if_rebutted_by_conditional: Contract_Voidable
    aliases:
    - Contract_Void
    - ContractValidity
    - Contract_Voidable
    legal_stage: Contract_Validity
    burden_of_proof: Respondent
    precondition: Contract_Existence
    independent_entities:
    - Dispute_Resolution_Clause_Valid
    - Liquidated_Damages_Clause_Valid
    state_machine:
      initial_state: VALID
      transitions:
      - from: VALID
        to: VOID
        trigger: Absolute_Rebuttal
        description: 自始无效事由触发
      - from: VALID
        to: VOIDABLE
        trigger: Conditional_Rebuttal_NotExercised
        description: 欺诈/胁迫存在但撤销权未行使
      - from: VOIDABLE
        to: VOID
        trigger: Conditional_Rebuttal_Exercised
        description: 撤销权行使→合同自始无效
      - from: PENDING
        to: VALID
        trigger: Ratification_By_Guardian
        description: 监护人追认→合同生效
      - from: CONDITIONAL
        to: VALID
        trigger: Condition_Fulfilled
        description: 条件成就→合同生效
      - from: VALID
        to: TERMINATED
        trigger: Contract_Rescinded
        description: 合同解除→向前失效
    initial_state: VALID
