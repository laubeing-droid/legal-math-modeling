    mapping:
      CN: 争议解决条款有效
      HK: 爭議解決條款有效
      US: Dispute Resolution Clause Valid
  Liquidated_Damages_Clause_Valid:
    meta_type: Strict_Atom
    parent: Remedy_Availability
    legal_stage: Contract_Validity
    burden_of_proof: Claimant
    precondition: Contract_Existence
    elements:
    - Clause_Exists_In_Contract
    attributes:
      necessary:
        CN: 1
        HK: 1
        US: 1
      defeasible: false
      rebuttal_criteria: []
    mapping:
      CN: 清算条款有效
      HK: 清算條款有效
      US: Liquidated Damages Clause Valid
  PreContractual_Reliance:
    meta_type: Strict_Atom
    parent: Reliance_Principle
    legal_stage: Remedy
    burden_of_proof: Claimant
    description: 缔约过失责任——合同未成立或无效时，信赖方的赔偿请求权
    trigger_on: NOT Contract_Existence OR Contract_Validity=VOID
    elements:
    - Reliance_Established
    - Loss_Occurred
    attributes:
      necessary:
        CN: 1
        HK: 1
        US: 1
      defeasible: false
      rebuttal_criteria: []
    mapping:
      CN: 缔约过失责任
      HK: 締約過失責任
      US: Pre-Contractual Liability
L1_meta_ontology:
  meta_layer: L1
  description: 通用元本体——所有法域、所有案由共用的抽象法律概念。L2领域概念继承自L1。
  concepts:
    Relationship_Establishment:
      description: 法律关系的成立
      domains:
      - contract
      - corporate
      - employment
      - family
      maps_to_L0: Status
    Right_Claim_Validity:
      description: 权利主张的有效性（含担保/质量/业权）
      domains:
      - contract
      - property
      - ip
      maps_to_L0: Status
    Obligation_Definition:
      description: 义务的界定（交付/付款/受领）
      domains:
      - contract
      - employment
      - lease
      maps_to_L0: Act
    Obligation_Breach:
      description: 义务违反的认定
      domains:
      - contract
      - tort
      - employment
      maps_to_L0: Status
    Remedy_Availability:
      description: 救济的可获得性（赔偿/强制履行）
      domains:
      - contract
      - tort
      - property
      maps_to_L0: Act
    Asset_Transfer:
      description: 资产的转移（货物/股权/知识产权）
      domains:
      - contract
      - corporate
      - ip
      - property
      maps_to_L0: Act
    Risk_Allocation:
      description: 风险的分配（市场价格/交付风险）
      domains:
      - contract
      - insurance
      maps_to_L0: Status
    Defense_Exclusion:
      description: 抗辩/免责条款
      domains:
      - contract
      - tort
      maps_to_L0: Defect
    Reliance_Principle:
      description: 信赖原则
      domains:
      - contract
      - tort
      - corporate
      maps_to_L0: Act
    Contextual_Override:
      description: 交易习惯/行业惯例对默认规则的覆盖
      domains:
      - contract
      - commercial
      maps_to_L0: Defect
    Possession_Rights:
      description: 占有权
      domains:
      - property
      - contract
      maps_to_L0: Power
    Encumbrance_Status:
      description: 产权负担状态
      domains:
      - property
      - contract
      - corporate
      maps_to_L0: Status
    Legal_Effectiveness:
      description: 法律效果的效力（可由反驳事由否定）
      domains:
      - contract
      - corporate
      - family
      maps_to_L0: Status
    Legal_Stage:
      description: 法律推理阶段：成立→效力→履行→违约→救济
      domains:
      - contract
      - tort
      - corporate
      maps_to_L0: Status
    Legal_Stage_Pipeline:
      description: 法律阶段流水线：前一阶段完成才进入下一阶段
      execution_order:
      - Fact_Finding
      - Contract_Formation
      - Contract_Validity
      - Contract_Interpretation
      - Performance
      - Breach
      - Remedy
      stage_dependency: strict
L0_primitives:
  meta_layer: L0
  description: 法律逻辑公理化原语——所有法域、所有案由的不可再分推理原子。L1继承自L0。
  primitives:
    Agent:
      class: Subject
      description: 权利义务主体
      subtypes_by_domain:
        contract:
        - Seller
        - Buyer
        - Lessor
        - Lessee
        corporate:
        - Shareholder
        - Director
        - Company
        labor:
        - Employer
        - Employee
        tort:
        - Plaintiff
        - Defendant
        - Tortfeasor
        family:
        - Spouse
        - Parent
        - Child
    Asset:
      class: Object
      description: 权利指向的客体
      subtypes_by_domain:
        contract:
        - Goods
        - Services
        - Money
        corporate:
        - Shares
        - Equity
        - VotingRights
        ip:
        - Patent
        - Copyright
        - Trademark
        - TradeSecret
        property:
        - RealEstate
        - Chattel
        - Leasehold
        family:
        - MatrimonialProperty
        - Custody
    Act:
      class: Action
      description: 法律行为——改变法律状态的作为或不作为
      subtypes_by_domain:
        contract:
        - Delivery
        - Payment
        - Acceptance
        corporate:
        - ShareTransfer
        - DividendPayment
        - ResolutionPassing
        labor:
        - WorkPerformance
        - WagePayment
        - Termination
        tort:
        - NegligentAct
        - IntentionalHarm
        - Defamation
    Status:
      class: State
      description: 法律效力的状态位置
      states:
      - Established
      - Valid
      - Pending
      - Conditional
      - Voidable
      - Void
      - Terminated
      - Breached
      - Remedied
      state_machine: Contract_Validity.state_machine
    Power:
      class: Capacity
      description: 处分权能——主体能否对客体施加法律变更
      constraints:
      - DispositionPower
      - Transferability
      - Alienability
      type_check: Power(Agent, Asset) → {0,1}
    Defect:
      class: Vitiator
      description: 效力阻断事由——使Status从Valid迁移到Void/Voidable的因素
      subtypes_by_domain:
        contract:
        - Fraud
        - Duress
        - Mistake
        - Illegality
        - Incapacity
        corporate:
        - UltraVires
        - MinorityOppression
        - InsiderTrading
        labor:
        - UnfairDismissal
        - Discrimination
        tort:
        - Consent
        - SelfDefence
        - Necessity
        - ContributoryNegligence
L0_schema:
  description: L0 原语属性契约——所有法域必须满足的结构接口。overrides 可修改属性值，不可删除必填属性。
  schemas:
    Act:
      required_properties:
      - causality_link
      - legal_intent
      legal_intent:
        default: Required
        override_allowed: true
        description: 大陆法=Required, 普通法=Optional(严格责任无意图)
      causality_link:
        default: Required
        override_allowed: false
        description: 任何法域的行为都必须有因果链
    Asset:
      required_properties:
      - transferability
      - alienability
      transferability:
        default: Required
        override_allowed: true
        description: 可转让性——大陆法默认允许，特定资产(违禁品)可覆写为Disabled
    Status:
      required_properties:
      - initial_state
      - valid_transitions
      initial_state:
        default: Established
        override_allowed: false
      valid_transitions:
        default:
        - Established→Valid
        - Valid→Void
        - Valid→Voidable
        - Valid→Terminated
        - PENDING→Valid
        - CONDITIONAL→Valid
        override_allowed: true
    Defect:
      required_properties:
      - effect_on_status
      - burden_of_proof
      effect_on_status:
        default: Status→Void
        override_allowed: false
    Agent:
      required_properties:
      - capacity_required
      capacity_required:
        default: Required
        override_allowed: true
        description: 大陆法=Required, 普通法未成年人可签必需品合同
    Power:
      required_properties:
      - disposition_power
      - transferability_check
      disposition_power:
        default: Required
        override_allowed: true
